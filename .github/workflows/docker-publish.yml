name: Build and Push Docker image

on:
  push:
    tags:
      - 'v*'  # Build automático si pusheás un tag de versión
  release:
    types: [published]  # Build también cuando publicás un release
  workflow_dispatch:
    inputs:
      custom_tag:
        description: 'Optional custom tag for manual builds (SemVer tags v1.0.2 or 1.0.2 also update latest)'
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine tag
        id: get_tag
        run: |
          if [[ -n "${{ github.event.inputs.custom_tag }}" ]]; then
            TAG=${{ github.event.inputs.custom_tag }}
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          elif [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG=main
          else
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
            BRANCH_NAME_SAFE=${BRANCH_NAME//\//-}
            TAG=$BRANCH_NAME_SAFE
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          if [[ "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "PUBLISH_LATEST=true" >> $GITHUB_ENV
          else
            echo "PUBLISH_LATEST=false" >> $GITHUB_ENV
          fi

      - name: Build and Push Docker image (multiarch)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            rja96/fireflyiii-telegram-bot:${{ env.TAG }}
            ${{ env.PUBLISH_LATEST == 'true' && 'rja96/fireflyiii-telegram-bot:latest' || '' }}
